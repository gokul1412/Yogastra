<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="New Classes Coming Soon to Yogastra.">
    <title>Coming Soon | Yogastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-section">
    
    <nav aria-label="Main navigation" class="navbar navbar-expand-lg bg-transparent shadow-none pt-4">
        <div class="container">
            <a class="navbar-brand text-dark" href="index.html"><i class="fas fa-leaf me-2"></i>Yogastra</a>
        </div>
    </nav>

    <section class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container text-center">
            <h1 class="display-3 fw-bold mb-3">New Classes Coming Soon</h1>
            <p class="lead text-muted mb-5 mx-auto" style="max-width: 600px;">We are preparing something special to help you deepen your practice. Sign up to be the first to know.</p>
            
            <!-- Dummy Countdown -->
            <div class="d-flex justify-content-center gap-4 mb-5">
                <div class="bg-white p-3 rounded-4 shadow-sm" style="min-width: 90px;">
                    <h2 class="fw-bold text-primary mb-0">14</h2>
                    <span class="small text-muted text-uppercase">Days</span>
                </div>
                <div class="bg-white p-3 rounded-4 shadow-sm" style="min-width: 90px;">
                    <h2 class="fw-bold text-primary mb-0">08</h2>
                    <span class="small text-muted text-uppercase">Hours</span>
                </div>
                <div class="bg-white p-3 rounded-4 shadow-sm" style="min-width: 90px;">
                    <h2 class="fw-bold text-primary mb-0">45</h2>
                    <span class="small text-muted text-uppercase">Mins</span>
                </div>
            </div>

            <!-- Mailchimp Placeholder -->
            <form class="d-flex gap-2 justify-content-center mx-auto" style="max-width: 500px;" onsubmit="event.preventDefault();">
                <input type="email" class="form-control form-control-lg bg-white" placeholder="Enter your email address" required>
                <button type="submit" class="btn btn-primary btn-lg">Notify Me</button>
            </form>
        </div>
    </section>

    <footer class="py-4 text-center">
        <div class="container">
            <div class="footer-social d-inline-flex mb-3">
                <a href="https://www.facebook.com/" class="text-dark bg-white shadow-sm" aria-label="Yogastra on Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/" class="text-dark bg-white shadow-sm" aria-label="Yogastra on Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/" class="text-dark bg-white shadow-sm" aria-label="Yogastra on Twitter"><i class="fab fa-twitter"></i></a>
            </div>
            <p class="mb-0 text-muted small">&copy; 2026 Yogastra. All rights reserved.</p>
        </div>
    </footer>

    <script src="../assets/js/main.js"></script>
</body>
</html>
