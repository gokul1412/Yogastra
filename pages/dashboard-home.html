<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Dashboard Home | Yogastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="bg-section">

    <div class="d-flex">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar bg-sidebar d-flex flex-column p-4 position-fixed h-100" id="dashboard-sidebar">
            <div class="mb-5 d-flex justify-content-between align-items-center">
                <a class="navbar-brand text-primary fs-4 fw-bold" href="index.html">
                    <i class="fas fa-leaf me-2"></i>Yogastra
                </a>
                <button type="button" class="btn btn-sm btn-light d-lg-none" id="sidebar-close" aria-label="Close Sidebar"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="flex-grow-1">
                <a href="dashboard-home.html" class="dashboard-nav-link active"><i class="fas fa-home me-2"></i> Home</a>
                <a href="dashboard-book.html" class="dashboard-nav-link"><i class="fas fa-calendar-plus me-2"></i> Book a Class</a>
                <a href="dashboard-history.html" class="dashboard-nav-link"><i class="fas fa-history me-2"></i> My Classes</a>
                <a href="dashboard-membership.html" class="dashboard-nav-link"><i class="fas fa-id-card me-2"></i> Membership</a>
                <a href="dashboard-profile.html" class="dashboard-nav-link"><i class="fas fa-user me-2"></i> Profile</a>
            </nav>
            
            <div class="mt-auto">
                <button type="button" class="theme-toggle mb-3" id="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon text-dark"></i>
                </button>
                <button type="button" class="rtl-toggle mb-3" id="rtl-toggle" aria-label="Toggle RTL Mode">
                    <i class="fas fa-language text-dark"></i>
                </button>
                <a href="index.html" class="dashboard-nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>
        </aside>
        
        <!-- Mobile Overlay -->
        <div class="dashboard-overlay" id="dashboard-overlay"></div>

        <!-- Main Content -->
        <main class="dashboard-main ms-auto p-4 p-md-5">
            <!-- Mobile Header -->
            <div class="d-lg-none d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Dashboard</h4>
                <button type="button" class="btn btn-outline-secondary" id="sidebar-toggle" aria-label="Open Sidebar"><i class="fas fa-bars"></i></button>
            </div>

            <!-- Real Content / Skeleton wrapper -->
            <div class="d-flex justify-content-between align-items-end mb-4 pb-3 border-bottom">
                <div>
                    <h2 class="fw-bold mb-1" id="welcomeTitle">Hello, Sarah</h2>
                    <p class="text-muted mb-0">Welcome back to your dashboard.</p>
                </div>
                <a href="dashboard-book.html" class="btn btn-primary d-none d-md-inline-flex">Quick Book</a>
            </div>

            <!-- Skeleton Loaders -->
            <div class="row g-4 mb-5 skeleton-content">
                <div class="col-md-6 col-lg-3"><div class="skeleton-box w-100 rounded-3" style="height: 120px;"></div></div>
                <div class="col-md-6 col-lg-3"><div class="skeleton-box w-100 rounded-3" style="height: 120px;"></div></div>
                <div class="col-md-6 col-lg-3"><div class="skeleton-box w-100 rounded-3" style="height: 120px;"></div></div>
                <div class="col-md-6 col-lg-3"><div class="skeleton-box w-100 rounded-3" style="height: 120px;"></div></div>
            </div>

            <div class="skeleton-content">
                <div class="skeleton-box w-25 rounded-3 mb-3" style="height: 30px;"></div>
                <div class="skeleton-box w-100 rounded-3" style="height: 250px;"></div>
            </div>

            <!-- Real Content -->
            <div class="real-content" id="userSummaryCards" style="display: none;">
                <!-- Summary Cards -->
                <div class="row g-4 mb-5">
                    <div class="col-md-6 col-lg-3">
                        <div class="bg-white p-4 rounded-4 shadow-sm border-start border-primary border-4 h-100">
                            <h6 class="text-muted mb-2">Upcoming Classes</h6>
                            <h3 class="fw-bold mb-0" id="statClassesThisWeek">0</h3>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="bg-white p-4 rounded-4 shadow-sm h-100">
                            <h6 class="text-muted mb-2">Total Attended</h6>
                            <h3 class="fw-bold mb-0" id="statTotalAttended">0</h3>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="bg-white p-4 rounded-4 shadow-sm h-100">
                            <h6 class="text-muted mb-2">Membership Status</h6>
                            <h6 class="fw-bold text-success mb-0" id="statMembershipStatus">Loading...</h6>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="bg-white p-4 rounded-4 shadow-sm h-100">
                            <h6 class="text-muted mb-2">Next Renewal</h6>
                            <h5 class="fw-bold mb-0">Oct 12, 2026</h5>
                        </div>
                    </div>
                </div>

                <!-- Upcoming Bookings -->
                <h4 class="fw-bold mb-3">Upcoming Bookings</h4>
                <div class="bg-white rounded-4 shadow-sm overflow-hidden mb-4">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="py-3 px-4">Date &amp; Time</th>
                                    <th class="py-3 px-4">Class</th>
                                    <th class="py-3 px-4">Instructor</th>
                                    <th class="py-3 px-4 text-end">Action</th>
                                </tr>
                            </thead>
                            <tbody id="upcomingBookingsTable">
                                <!-- Dynamic upcoming bookings -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- End Real Content -->

        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin-data.js"></script>
    <script src="../assets/js/user-dashboard.js"></script>
</body>
</html>
