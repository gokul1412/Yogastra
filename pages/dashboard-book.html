<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Book a Class | Yogastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="bg-section">

    <div class="d-flex">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar bg-sidebar d-flex flex-column p-4 position-fixed h-100" id="dashboard-sidebar">
            <div class="mb-5 d-flex justify-content-between align-items-center">
                <a class="navbar-brand text-primary fs-4 fw-bold" href="index.html"><i class="fas fa-leaf me-2"></i>Yogastra</a>
                <button type="button" class="btn btn-sm btn-light d-lg-none" id="sidebar-close" aria-label="Close Sidebar"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="flex-grow-1">
                <a href="dashboard-home.html" class="dashboard-nav-link"><i class="fas fa-home me-2"></i> Home</a>
                <a href="dashboard-book.html" class="dashboard-nav-link active"><i class="fas fa-calendar-plus me-2"></i> Book a Class</a>
                <a href="dashboard-history.html" class="dashboard-nav-link"><i class="fas fa-history me-2"></i> My Classes</a>
                <a href="dashboard-membership.html" class="dashboard-nav-link"><i class="fas fa-id-card me-2"></i> Membership</a>
                <a href="dashboard-profile.html" class="dashboard-nav-link"><i class="fas fa-user me-2"></i> Profile</a>
            </nav>
            
            <div class="mt-auto">
                <button type="button" class="theme-toggle mb-3" id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon text-dark"></i></button>
                <button type="button" class="rtl-toggle mb-3" id="rtl-toggle" aria-label="Toggle RTL Mode"><i class="fas fa-language text-dark"></i></button>
                <a href="index.html" class="dashboard-nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>
        </aside>
        
        <div class="dashboard-overlay" id="dashboard-overlay"></div>

        <!-- Main Content -->
        <main class="dashboard-main ms-auto p-4 p-md-5">
            <div class="d-lg-none d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Book a Class</h4>
                <button type="button" class="btn btn-outline-secondary" id="sidebar-toggle" aria-label="Open Sidebar"><i class="fas fa-bars"></i></button>
            </div>

            <div class="d-flex justify-content-between align-items-end mb-4 pb-3 border-bottom">
                <div>
                    <h2 class="fw-bold mb-1">Book a Class</h2>
                    <p class="text-muted mb-0">Reserve your spot for upcoming sessions.</p>
                </div>
            </div>

            <!-- Skeleton Content -->
            <div class="skeleton-content mb-4">
                <div class="skeleton-box w-100 rounded-3 mb-4" style="height: 60px;"></div>
                <div class="row g-4">
                    <div class="col-md-6 col-lg-4"><div class="skeleton-box w-100 rounded-4" style="height: 250px;"></div></div>
                    <div class="col-md-6 col-lg-4"><div class="skeleton-box w-100 rounded-4" style="height: 250px;"></div></div>
                    <div class="col-md-6 col-lg-4"><div class="skeleton-box w-100 rounded-4" style="height: 250px;"></div></div>
                </div>
            </div>

            <!-- Real Content -->
            <div class="real-content" id="userAvailableClasses" style="display: none;">
                <!-- Filter -->
                <div class="bg-white p-3 rounded-3 shadow-sm mb-4 d-flex flex-wrap gap-3 align-items-center">
                    <select class="form-select w-auto">
                        <option selected>Any Date</option>
                        <option>Today</option>
                        <option>Tomorrow</option>
                    </select>
                    <select class="form-select w-auto">
                        <option selected>Any Style</option>
                        <option>Vinyasa</option>
                        <option>Hatha</option>
                        <option>Yin</option>
                    </select>
                    <select class="form-select w-auto">
                        <option selected>Any Instructor</option>
                        <option>Sarah Jenkins</option>
                        <option>David Chen</option>
                        <option>Kiran Rani</option>
                    </select>
                </div>

                <!-- Available Classes Grid -->
                <div class="row g-4" id="userAvailableClassesGrid">
                    <!-- Dynamic classes load here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Booking Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-4 p-md-5 pt-0">
                    <div class="mb-4 text-primary">
                        <i class="fas fa-calendar-check" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Confirm Booking</h3>
                    <p class="text-muted mb-4">Are you sure you want to book <strong class="text-dark">Dynamic Vinyasa</strong> with <strong class="text-dark">Sarah Jenkins</strong>?</p>
                    <p class="small text-muted mb-4">This will use 1 class from your Standard plan allowance.</p>
                    
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary px-4" id="confirmBookBtn">Confirm Booking</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin-data.js"></script>
    <script src="../assets/js/user-dashboard.js"></script>
</body>
</html>
