<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>My Classes | Yogastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="bg-section">

    <div class="d-flex">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar bg-sidebar d-flex flex-column p-4 position-fixed h-100" id="dashboard-sidebar">
            <div class="mb-5 d-flex justify-content-between align-items-center">
                <a class="navbar-brand text-primary fs-4 fw-bold" href="index.html"><i class="fas fa-leaf me-2"></i>Yogastra</a>
                <button type="button" class="btn btn-sm btn-light d-lg-none" id="sidebar-close" aria-label="Close Sidebar"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="flex-grow-1" aria-label="Dashboard navigation">
                <a href="dashboard-home.html" class="dashboard-nav-link"><i class="fas fa-home me-2"></i> Home</a>
                <a href="dashboard-book.html" class="dashboard-nav-link"><i class="fas fa-calendar-plus me-2"></i> Book a Class</a>
                <a href="dashboard-history.html" class="dashboard-nav-link active"><i class="fas fa-history me-2"></i> My Classes</a>
                <a href="dashboard-membership.html" class="dashboard-nav-link"><i class="fas fa-id-card me-2"></i> Membership</a>
                <a href="dashboard-profile.html" class="dashboard-nav-link"><i class="fas fa-user me-2"></i> Profile</a>
            </nav>
            
            <div class="mt-auto">
                <button type="button" class="theme-toggle mb-3" id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon text-dark"></i></button>
                <button type="button" class="rtl-toggle mb-3" id="rtl-toggle" aria-label="Toggle RTL Mode"><i class="fas fa-language text-dark"></i></button>
                <a href="index.html" class="dashboard-nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>
        </aside>
        
        <div class="dashboard-overlay" id="dashboard-overlay"></div>

        <!-- Main Content -->
        <main class="dashboard-main ms-auto p-4 p-md-5">
            <div class="d-lg-none d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">My Classes</h4>
                <button type="button" class="btn btn-outline-secondary" id="sidebar-toggle" aria-label="Open Sidebar"><i class="fas fa-bars"></i></button>
            </div>

            <div class="d-flex justify-content-between align-items-end mb-4 pb-3 border-bottom">
                <div>
                    <h2 class="fw-bold mb-1">Class History</h2>
                    <p class="text-muted mb-0">Review your past attendance and upcoming schedule.</p>
                </div>
            </div>

            <div class="skeleton-content mb-4">
                <div class="skeleton-box w-100 rounded-4" style="height: 400px;"></div>
            </div>

            <div class="real-content" id="userClassHistory" style="display: none;">
                <div class="bg-white rounded-4 shadow-sm overflow-hidden mb-4">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="py-3 px-4">Date</th>
                                    <th class="py-3 px-4">Class</th>
                                    <th class="py-3 px-4">Instructor</th>
                                    <th class="py-3 px-4">Duration</th>
                                    <th class="py-3 px-4">Status</th>
                                </tr>
                            </thead>
                            <tbody id="userClassHistoryTable">
                                <!-- Dynamic class history loads here -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- Pagination -->
                <nav aria-label="History pagination">
                    <ul class="pagination justify-content-end mb-0">
                        <li class="page-item disabled"><a class="page-link" href="dashboard-history.html" tabindex="-1">Previous</a></li>
                        <li class="page-item active"><a class="page-link" href="dashboard-history.html">1</a></li>
                        <li class="page-item"><a class="page-link" href="dashboard-history.html">2</a></li>
                        <li class="page-item"><a class="page-link" href="dashboard-history.html">3</a></li>
                        <li class="page-item"><a class="page-link" href="dashboard-history.html">Next</a></li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin-data.js"></script>
    <script src="../assets/js/user-dashboard.js"></script>
</body>
</html>
