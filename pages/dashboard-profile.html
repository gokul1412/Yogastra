<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Profile | Yogastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="bg-section">

    <div class="d-flex">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar bg-sidebar d-flex flex-column p-4 position-fixed h-100" id="dashboard-sidebar">
            <div class="mb-5 d-flex justify-content-between align-items-center">
                <a class="navbar-brand text-primary fs-4 fw-bold" href="index.html">
                    <i class="fas fa-leaf me-2"></i>Yogastra
                </a>
                <button type="button" class="btn btn-sm btn-light d-lg-none" id="sidebar-close" aria-label="Close Sidebar"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="flex-grow-1">
                <a href="dashboard-home.html" class="dashboard-nav-link"><i class="fas fa-home me-2"></i> Home</a>
                <a href="dashboard-book.html" class="dashboard-nav-link"><i class="fas fa-calendar-plus me-2"></i> Book a Class</a>
                <a href="dashboard-history.html" class="dashboard-nav-link"><i class="fas fa-history me-2"></i> My Classes</a>
                <a href="dashboard-membership.html" class="dashboard-nav-link"><i class="fas fa-id-card me-2"></i> Membership</a>
                <a href="dashboard-profile.html" class="dashboard-nav-link active"><i class="fas fa-user me-2"></i> Profile</a>
            </nav>
            
            <div class="mt-auto">
                <button type="button" class="theme-toggle mb-3" id="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon text-dark"></i>
                </button>
                <button type="button" class="rtl-toggle mb-3" id="rtl-toggle" aria-label="Toggle RTL Mode">
                    <i class="fas fa-language text-dark"></i>
                </button>
                <a href="index.html" class="dashboard-nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>
        </aside>
        
        <!-- Mobile Overlay -->
        <div class="dashboard-overlay" id="dashboard-overlay"></div>

        <!-- Main Content -->
        <main class="dashboard-main ms-auto p-4 p-md-5">
            <!-- Mobile Header -->
            <div class="d-lg-none d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Profile</h4>
                <button type="button" class="btn btn-outline-secondary" id="sidebar-toggle" aria-label="Open Sidebar"><i class="fas fa-bars"></i></button>
            </div>

            <div class="d-flex justify-content-between align-items-end mb-4 pb-3 border-bottom">
                <div>
                    <h2 class="fw-bold mb-1">My Profile</h2>
                    <p class="text-muted mb-0">Manage your personal and medical details.</p>
                </div>
            </div>

            <div class="skeleton-content">
                <div class="row g-4 mb-5">
                    <div class="col-lg-4"><div class="skeleton-box w-100 rounded-4" style="height: 300px;"></div></div>
                    <div class="col-lg-8"><div class="skeleton-box w-100 rounded-4" style="height: 500px;"></div></div>
                </div>
            </div>

            <div class="real-content" id="userProfilePage" style="display: none;">
                <form id="userProfileForm" onsubmit="event.preventDefault(); saveUserFullProfile();">
                    <div class="row g-4 mb-5">
                        <!-- Profile Image -->
                        <div class="col-lg-4">
                            <div class="bg-white p-4 rounded-4 shadow-sm h-100 text-center d-flex flex-column align-items-center justify-content-center">
                                <img src="" id="userProfileImagePreview" class="rounded-circle mb-3 border border-4 border-primary" style="width: 150px; height: 150px; object-fit: cover;" alt="Profile Picture">
                                <h5 class="fw-bold mb-1" id="userProfileDisplayName">Sarah Jenkins</h5>
                                <p class="text-muted small mb-4" id="userProfileDisplayEmail">sarah@example.com</p>
                                
                                <label for="userProfileImageInput" class="btn btn-outline-primary btn-sm w-100">
                                    <i class="fas fa-camera me-2"></i> Change Photo
                                </label>
                                <input type="file" id="userProfileImageInput" class="d-none" accept="image/*">
                            </div>
                        </div>
                        
                        <!-- Profile Details -->
                        <div class="col-lg-8">
                            <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm border-top border-primary border-4 h-100">
                                <h5 class="fw-bold mb-4">Personal Information</h5>
                                
                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">Full Name</label>
                                        <input type="text" class="form-control bg-light" id="userProfileNameFull" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">Email Address</label>
                                        <input type="email" class="form-control bg-light" id="userProfileEmailFull" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">Phone Number</label>
                                        <input type="tel" class="form-control bg-light" id="userProfilePhoneFull" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">Address</label>
                                        <input type="text" class="form-control bg-light" id="userProfileAddress">
                                    </div>
                                </div>
                                
                                <hr class="my-4">
                                
                                <h5 class="fw-bold mb-4">Emergency & Medical</h5>
                                
                                <div class="row g-3 mb-4">
                                    <div class="col-md-12">
                                        <label class="form-label text-muted small fw-bold">Emergency Contact (Name & Phone)</label>
                                        <input type="text" class="form-control bg-light" id="userProfileEmergency">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label text-muted small fw-bold">Medical Conditions / Injuries</label>
                                        <textarea class="form-control bg-light" id="userProfileMedical" rows="3" placeholder="e.g. Tight hamstrings, asthma, recent surgery..."></textarea>
                                        <small class="text-muted mt-1 d-block">This helps our instructors tailor the session for you safely.</small>
                                    </div>
                                </div>
                                
                                <div class="d-flex justify-content-end">
                                    <button type="submit" class="btn btn-primary px-4 py-2 fw-bold shadow-sm">Save Changes</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin-data.js"></script>
    <script src="../assets/js/user-dashboard.js"></script>
</body>
</html>
